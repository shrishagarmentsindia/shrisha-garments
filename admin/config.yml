backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "products"
    label: "T-Shirts"
    folder: "products"
    create: true
    delete: true
    slug: "{{slug}}"
    fields:
      - { label: "Product Name",     name: "name",      widget: "string",   hint: "e.g. Classic White Crew Neck" }
      - { label: "Price (₹)",        name: "price",     widget: "number",   hint: "Enter number only, e.g. 799" }
      - { label: "Original Price (for strikethrough, leave 0 if no discount)", name: "originalPrice", widget: "number", default: 0 }
      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - { label: "Graphic Tees",      value: "Graphic Tees" }
          - { label: "Plain & Solid",     value: "Plain & Solid" }
          - { label: "Polo T-Shirts",     value: "Polo T-Shirts" }
          - { label: "Oversized Fits",    value: "Oversized Fits" }
          - { label: "Printed Collection",value: "Printed Collection" }
          - { label: "Limited Edition",   value: "Limited Edition" }
      - label: "Sizes Available"
        name: "sizes"
        widget: "select"
        multiple: true
        options: ["XS","S","M","L","XL","XXL","3XL"]
        default: ["S","M","L","XL"]
      - label: "Colors Available"
        name: "colors"
        widget: "list"
        hint: "Enter color names separated by adding items, e.g. White, Black, Navy"
        field: { label: "Color", name: "color", widget: "string" }
      - label: "Badge"
        name: "badge"
        widget: "select"
        required: false
        options:
          - { label: "None",        value: "" }
          - { label: "New Arrival", value: "New Arrival" }
          - { label: "Bestseller",  value: "Bestseller" }
          - { label: "Sale",        value: "Sale" }
          - { label: "Limited",     value: "Limited" }
          - { label: "Trending",    value: "Trending" }
        default: ""
      - label: "Card Color Theme"
        name: "bgColor"
        widget: "select"
        options:
          - { label: "Dark Charcoal",  value: "#1A1A1A" }
          - { label: "Warm Ivory",     value: "#F5F0E8" }
          - { label: "Navy Blue",      value: "#1B2A4A" }
          - { label: "Forest Green",   value: "#2D4A3E" }
          - { label: "Terracotta",     value: "#C4856A" }
          - { label: "Dusty Rose",     value: "#D4A5A5" }
          - { label: "Slate Blue",     value: "#3D5A80" }
          - { label: "Warm Tan",       value: "#C9A97A" }
        default: "#1A1A1A"
      - label: "Featured (shows as large card)"
        name: "featured"
        widget: "boolean"
        default: false
        hint: "Only one product should be featured at a time"
      - label: "In Stock"
        name: "inStock"
        widget: "boolean"
        default: true
      - label: "Sort Order (lower = appears first)"
        name: "sortOrder"
        widget: "number"
        default: 10
      - label: "Short Description"
        name: "description"
        widget: "text"
        required: false
        hint: "Optional: 1-2 lines shown on hover or product detail"

  - name: "settings"
    label: "Site Settings"
    files:
      - label: "General Settings"
        name: "general"
        file: "admin/site-settings.json"
        fields:
          - { label: "Phone Number",   name: "phone",    widget: "string" }
          - { label: "Email Address",  name: "email",    widget: "string" }
          - { label: "Tagline",        name: "tagline",  widget: "string" }
          - { label: "Hero Subtitle",  name: "heroSub",  widget: "text" }
          - { label: "Years Experience", name: "yearsExp", widget: "string" }
          - { label: "Happy Customers",  name: "customers", widget: "string" }
          - { label: "Designs Count",    name: "designs",   widget: "string" }
          - label: "Announcement Bar Text"
            name: "announcement"
            widget: "string"
            hint: "Text shown in the gold marquee bar"
