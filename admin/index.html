<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shrisha Garments — Admin</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👗</text></svg>"/>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@200;300;400&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet"/>

  <!-- Netlify Identity widget — must load FIRST before decap cms -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}

    /* Hide everything by default — gate controls visibility */
    body{background:#111009;font-family:'Josefin Sans',sans-serif;min-height:100vh;overflow:hidden;}

    /* ── AUTH GATE ── */
    #gate{
      position:fixed;inset:0;z-index:99999;background:#111009;
      display:flex;align-items:center;justify-content:center;
      padding:20px;
      background-image:radial-gradient(ellipse at 30% 70%,rgba(201,168,76,.07) 0%,transparent 60%);
    }
    .box{border:1px solid rgba(201,168,76,.22);background:rgba(255,255,255,.02);padding:52px 44px;max-width:440px;width:100%;text-align:center;animation:fadeUp .5s ease both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
    .logo{font-family:'Cormorant Garamond',serif;font-size:2.1rem;font-weight:300;letter-spacing:.15em;color:#FAF7F2;margin-bottom:5px;}
    .logo span{color:#C9A84C;}
    .badge{font-size:.52rem;letter-spacing:.28em;text-transform:uppercase;color:#C9A84C;display:block;margin-bottom:40px;}
    .gate-title{font-family:'Cormorant Garamond',serif;font-size:1.55rem;font-weight:300;color:#FAF7F2;margin-bottom:10px;}
    .gate-title em{font-style:italic;color:#E8D08A;}
    .gate-desc{font-size:.66rem;color:#7A7060;line-height:2;letter-spacing:.06em;margin-bottom:32px;}

    .field{margin-bottom:14px;text-align:left;}
    .field label{display:block;font-size:.54rem;letter-spacing:.2em;text-transform:uppercase;color:#C9A84C;margin-bottom:7px;}
    .field input{
      width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.18);
      color:#FAF7F2;padding:13px 15px;
      font-family:'Josefin Sans',sans-serif;font-size:.76rem;letter-spacing:.05em;
      outline:none;transition:border-color .3s;
    }
    .field input:focus{border-color:#C9A84C;}
    .field input::placeholder{color:#3a3530;}

    .btn-primary{
      width:100%;background:#C9A84C;color:#111009;border:none;padding:15px;
      cursor:pointer;font-family:'Josefin Sans',sans-serif;
      font-size:.63rem;letter-spacing:.28em;text-transform:uppercase;
      transition:background .3s;margin-top:6px;
    }
    .btn-primary:hover{background:#E8D08A;}
    .btn-primary:disabled{background:#5a4e30;cursor:not-allowed;}

    .forgot-btn{
      background:none;border:none;color:#7A7060;font-family:'Josefin Sans',sans-serif;
      font-size:.58rem;letter-spacing:.12em;cursor:pointer;margin-top:14px;
      display:block;width:100%;text-align:center;transition:color .3s;padding:4px;
    }
    .forgot-btn:hover{color:#C9A84C;}

    .divider{border:none;border-top:1px solid rgba(201,168,76,.12);margin:24px 0;}
    .back-link{font-size:.58rem;color:#7A7060;letter-spacing:.1em;text-decoration:none;transition:color .3s;}
    .back-link:hover{color:#C9A84C;}

    .msg{font-size:.63rem;letter-spacing:.07em;margin-top:14px;padding:10px 13px;display:none;text-align:left;}
    .msg.error{color:#e07070;background:rgba(224,112,112,.07);border:1px solid rgba(224,112,112,.18);}
    .msg.ok{color:#70c070;background:rgba(112,192,112,.07);border:1px solid rgba(112,192,112,.18);}
    .msg.show{display:block;}

    .spinner{display:none;width:20px;height:20px;border:2px solid rgba(201,168,76,.15);border-top-color:#C9A84C;border-radius:50%;animation:spin .7s linear infinite;margin:14px auto 0;}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── CMS AREA — hidden until logged in ── */
    #cms-area{display:none;position:fixed;inset:0;overflow:auto;background:#fff;}
  </style>
</head>
<body>

<!-- GATE: shown until authenticated -->
<div id="gate">
  <div class="box">
    <div class="logo">Shrisha<span>.</span></div>
    <span class="badge">Admin Panel · Authorised Access Only</span>

    <div class="gate-title">Admin <em>Login</em></div>
    <p class="gate-desc">Enter your invited admin email and password to manage products and site content.</p>

    <div class="field">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="admin@example.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>

    <button class="btn-primary" id="btn-login" onclick="doLogin()">Login to Admin Panel</button>
    <div class="spinner" id="spinner"></div>
    <div class="msg" id="msg"></div>

    <button class="forgot-btn" onclick="showForgot()">Forgot password?</button>

    <hr class="divider"/>
    <a href="/" class="back-link">← Back to Shrisha Garments website</a>
  </div>
</div>

<!-- CMS renders here after login -->
<div id="cms-area"></div>

<script>
/* ══════════════════════════════════════════════════════
   APPROACH: Use netlifyIdentity JS API directly.
   We call netlifyIdentity.login() with credentials —
   this uses the Identity service properly without
   needing the popup widget UI at all.
   ══════════════════════════════════════════════════════ */

var ni = window.netlifyIdentity;

function msg(text, type) {
  var el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type + ' show';
}
function clearMsg() {
  var el = document.getElementById('msg');
  el.className = 'msg';
}
function setLoading(on) {
  document.getElementById('btn-login').disabled = on;
  document.getElementById('spinner').style.display = on ? 'block' : 'none';
}

function showForgot() {
  var email = document.getElementById('email').value.trim();
  if (!email) { msg('Enter your email address above first.', 'error'); return; }
  setLoading(true);
  clearMsg();
  ni.requestPasswordRecovery(email)
    .then(function() {
      setLoading(false);
      msg('Password reset email sent to ' + email + '. Check your inbox.', 'ok');
    })
    .catch(function(e) {
      setLoading(false);
      msg('Could not send reset email. Make sure this email has been invited.', 'error');
    });
}

function grantAccess() {
  document.getElementById('gate').style.display = 'none';
  var area = document.getElementById('cms-area');
  area.style.display = 'block';
  // Dynamically load Decap CMS now
  var s = document.createElement('script');
  s.src = 'https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js';
  document.head.appendChild(s);
}

function doLogin() {
  var email    = document.getElementById('email').value.trim();
  var password = document.getElementById('password').value;
  if (!email)    { msg('Please enter your email address.', 'error'); return; }
  if (!password) { msg('Please enter your password.', 'error'); return; }
  clearMsg();
  setLoading(true);

  ni.login(email, password, true)
    .then(function(user) {
      setLoading(false);
      if (user) {
        grantAccess();
      } else {
        msg('Login failed. Please check your credentials.', 'error');
      }
    })
    .catch(function(e) {
      setLoading(false);
      var errText = (e && e.json && e.json.error_description)
        ? e.json.error_description
        : (e && e.message ? e.message : 'Invalid email or password.');
      msg('Login failed: ' + errText, 'error');
    });
}

// Allow Enter key to submit
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});

// Check for existing valid session on page load
ni.on('init', function(user) {
  if (user) {
    // Already logged in — go straight to CMS
    grantAccess();
  }
  // else stay on login screen
});

ni.on('logout', function() {
  // Re-show gate on logout
  document.getElementById('gate').style.display = 'flex';
  document.getElementById('cms-area').style.display = 'none';
});
</script>

</body>
</html>
