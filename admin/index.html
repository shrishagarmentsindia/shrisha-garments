<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shrisha Garments — Admin</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👗</text></svg>"/>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@200;300;400&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#111009;font-family:'Josefin Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}

    #login-screen{
      width:100%;max-width:460px;margin:auto;padding:20px;
    }
    .box{
      border:1px solid rgba(201,168,76,.25);
      background:rgba(255,255,255,.02);
      padding:56px 48px;text-align:center;
    }
    .logo{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:300;letter-spacing:.15em;color:#FAF7F2;margin-bottom:6px;}
    .logo span{color:#C9A84C;}
    .badge{font-size:.55rem;letter-spacing:.3em;text-transform:uppercase;color:#C9A84C;margin-bottom:44px;display:block;}
    h2{font-family:'Cormorant Garamond',serif;font-size:1.6rem;font-weight:300;color:#FAF7F2;margin-bottom:10px;}
    h2 em{font-style:italic;color:#E8D08A;}
    .desc{font-size:.68rem;color:#7A7060;line-height:2;letter-spacing:.06em;margin-bottom:36px;}

    /* Custom login form */
    .field{margin-bottom:16px;text-align:left;}
    .field label{display:block;font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:#C9A84C;margin-bottom:8px;}
    .field input{
      width:100%;background:rgba(255,255,255,.04);
      border:1px solid rgba(201,168,76,.2);
      color:#FAF7F2;padding:14px 16px;
      font-family:'Josefin Sans',sans-serif;font-size:.78rem;
      letter-spacing:.06em;outline:none;transition:border-color .3s;
    }
    .field input:focus{border-color:#C9A84C;}
    .field input::placeholder{color:#4a4540;}

    .btn-submit{
      width:100%;background:#C9A84C;color:#111009;border:none;
      padding:16px;cursor:pointer;margin-top:8px;
      font-family:'Josefin Sans',sans-serif;
      font-size:.65rem;letter-spacing:.3em;text-transform:uppercase;
      transition:background .3s;
    }
    .btn-submit:hover{background:#E8D08A;}
    .btn-submit:disabled{background:#5a4e30;cursor:not-allowed;color:#8a7a50;}

    .msg{font-size:.65rem;letter-spacing:.08em;margin-top:16px;padding:10px 14px;display:none;}
    .msg.error{color:#e07070;background:rgba(224,112,112,.08);border:1px solid rgba(224,112,112,.2);}
    .msg.info{color:#C9A84C;background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.15);}

    .divider{width:40px;height:1px;background:rgba(201,168,76,.2);margin:28px auto;}
    .forgot{font-size:.6rem;color:#7A7060;letter-spacing:.1em;cursor:pointer;transition:color .3s;background:none;border:none;display:block;margin:12px auto 0;}
    .forgot:hover{color:#C9A84C;}

    .spinner{display:none;width:20px;height:20px;border:2px solid rgba(201,168,76,.2);border-top-color:#C9A84C;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* CMS wrapper — hidden until logged in */
    #cms-root{display:none;position:fixed;inset:0;}
  </style>
</head>
<body>

<!-- ── CUSTOM LOGIN SCREEN ── -->
<div id="login-screen">
  <div class="box">
    <div class="logo">Shrisha<span>.</span></div>
    <span class="badge">Admin Panel · Authorised Access Only</span>

    <h2>Welcome <em>Back</em></h2>
    <p class="desc">Sign in with your invited admin email and password to manage products and site settings.</p>

    <div class="field">
      <label>Email Address</label>
      <input type="email" id="inp-email" placeholder="your@email.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="inp-password" placeholder="Your password" autocomplete="current-password"/>
    </div>

    <button class="btn-submit" id="btn-login" onclick="doLogin()">Login to Admin Panel</button>
    <div class="spinner" id="spinner"></div>
    <div class="msg" id="msg"></div>

    <div class="divider"></div>
    <button class="forgot" onclick="doForgot()">Forgot password? Send reset email</button>
  </div>
</div>

<!-- ── CMS MOUNTS HERE after login ── -->
<div id="cms-root"></div>

<script>
/* ══════════════════════════════════════════════
   Netlify Identity JS (lightweight, no widget UI)
   We call the API directly — no popup needed
   ══════════════════════════════════════════════ */

const NETLIFY_IDENTITY_URL = window.location.origin + '/.netlify/identity';

let currentToken = null;

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}

function setLoading(loading) {
  document.getElementById('btn-login').disabled = loading;
  document.getElementById('spinner').style.display = loading ? 'block' : 'none';
  if (loading) document.getElementById('msg').style.display = 'none';
}

async function doLogin() {
  const email    = document.getElementById('inp-email').value.trim();
  const password = document.getElementById('inp-password').value;

  if (!email)    { showMsg('Please enter your email address.', 'error'); return; }
  if (!password) { showMsg('Please enter your password.', 'error'); return; }

  setLoading(true);

  try {
    const res = await fetch(NETLIFY_IDENTITY_URL + '/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({ grant_type: 'password', username: email, password })
    });

    const data = await res.json();

    if (!res.ok) {
      const errMsg = data.error_description || data.msg || data.error || 'Invalid email or password.';
      setLoading(false);
      showMsg('❌ ' + errMsg, 'error');
      return;
    }

    // Success — store token and load CMS
    currentToken = data.access_token;
    localStorage.setItem('gotrue.user', JSON.stringify({
      token: { access_token: data.access_token, refresh_token: data.refresh_token, expires_in: data.expires_in },
      email: email
    }));

    setLoading(false);
    loadCMS();

  } catch (err) {
    setLoading(false);
    showMsg('❌ Connection error. Check your internet and try again.', 'error');
  }
}

async function doForgot() {
  const email = document.getElementById('inp-email').value.trim();
  if (!email) { showMsg('Enter your email address above first, then click Forgot Password.', 'error'); return; }

  setLoading(true);
  try {
    const res = await fetch(NETLIFY_IDENTITY_URL + '/recover', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    setLoading(false);
    if (res.ok) {
      showMsg('✅ Password reset email sent to ' + email + '. Check your inbox.', 'info');
    } else {
      showMsg('Could not send reset email. Make sure this email is registered.', 'error');
    }
  } catch(e) {
    setLoading(false);
    showMsg('Connection error. Try again.', 'error');
  }
}

function loadCMS() {
  // Hide login, show CMS
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('cms-root').style.display = 'block';
  document.body.style.display = 'block';

  // Dynamically load Decap CMS now that auth is done
  const script = document.createElement('script');
  script.src = 'https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js';
  document.body.appendChild(script);
}

// Allow Enter key to submit
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});

// Check if already logged in from a previous session
(function checkExistingSession() {
  try {
    const stored = localStorage.getItem('gotrue.user');
    if (stored) {
      const user = JSON.parse(stored);
      if (user && user.token && user.token.access_token) {
        // Verify token is still valid
        fetch(NETLIFY_IDENTITY_URL + '/user', {
          headers: { 'Authorization': 'Bearer ' + user.token.access_token }
        }).then(res => {
          if (res.ok) {
            loadCMS(); // Token still valid, skip login
          } else {
            localStorage.removeItem('gotrue.user'); // Expired, show login
          }
        }).catch(() => {}); // Network error, just show login
      }
    }
  } catch(e) {}
})();
</script>

</body>
</html>
