[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# Netlify sends invite emails with the site root URL + hash token.
# This redirect catches it and sends user to the password-set page.
[[redirects]]
  from = "/"
  to = "/set-password.html"
  status = 200
  conditions = {Query = ["invite_token"]}

[[redirects]]
  from = "/"
  to = "/set-password.html"
  status = 200
  conditions = {Query = ["recovery_token"]}
