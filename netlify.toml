[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# Redirect Netlify invite & recovery token links to dedicated password page
[[redirects]]
  from = "/#invite_token=*"
  to = "/set-password.html#invite_token=:splat"
  status = 301

[[redirects]]
  from = "/#recovery_token=*"
  to = "/set-password.html#recovery_token=:splat"
  status = 301
